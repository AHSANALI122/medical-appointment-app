services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: medbook
      POSTGRES_PASSWORD: medbook
      POSTGRES_DB: medbook
    ports:
      - "5432:5432"
    volumes:
      - medbook_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medbook -d medbook"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  medbook_pg_data:
