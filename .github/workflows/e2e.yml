name: E2E

# F30 — critical path on every PR, full suite nightly.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 02:00 UTC = 07:00 Asia/Karachi — a failure is waiting when the team
    # starts, not overnight.
    - cron: "0 2 * * *"

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medbook
          POSTGRES_PASSWORD: medbook
          POSTGRES_DB: medbook
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medbook -d medbook"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://medbook:medbook@localhost:5432/medbook
      JWT_SECRET: ci-only-not-a-real-secret
      ENCRYPTION_KEY: sOyeA2Z9A26_msHUUldM93Ubl2ZwHnfE3D7Dcf11a-0=
      ENVIRONMENT: test
      FRONTEND_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Seed demo data
        working-directory: backend
        # The e2e suite books against these seeded doctors/slots.
        run: uv run python scripts/seed_demo.py

      - name: Start backend
        working-directory: backend
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # Poll /health rather than sleeping a fixed interval — it returns
          # 503 until the DB is actually reachable (docs/observability.md),
          # so this waits for real readiness.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 2
          done
          echo "backend failed to become healthy"; curl -s http://localhost:8000/health; exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run critical-path e2e (every PR)
        if: github.event_name != 'schedule'
        working-directory: frontend
        run: npx playwright test --project=critical

      - name: Run full e2e suite (nightly)
        if: github.event_name == 'schedule'
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      # F28 acceptance: "Lighthouse CI check in pipeline", >=90
      # performance/accessibility on the doctor profile + search pages.
      - name: Lighthouse CI
        working-directory: frontend
        run: |
          npm install -g @lhci/cli@0.14.x
          # The profile page needs a real doctor id — take one from the
          # seeded data rather than hardcoding a UUID that would rot.
          DOCTOR_ID=$(curl -s "http://localhost:8000/api/v1/doctors?page=1&page_size=1" | jq -r '.items[0].id')
          if [ -z "$DOCTOR_ID" ] || [ "$DOCTOR_ID" = "null" ]; then
            echo "no seeded doctor found — cannot audit the profile page"; exit 1
          fi
          lhci autorun \
            --collect.url=http://localhost:3000/ \
            --collect.url=http://localhost:3000/doctors \
            --collect.url="http://localhost:3000/doctors/$DOCTOR_ID"

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: frontend/lighthouse-report/
          retention-days: 7
